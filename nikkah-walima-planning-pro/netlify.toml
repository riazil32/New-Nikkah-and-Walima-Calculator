[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Firebase SDK typings contain "AIza..." placeholder strings that trigger
  # Netlify's secrets scanner as a false positive. This disables smart
  # detection so the build isn't blocked by node_modules content.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[dev]
  targetPort = 3000  # Vite runs on port 3000
  port = 8888        # Netlify dev will run on 8888
  autoLaunch = false

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
